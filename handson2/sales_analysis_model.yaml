name: sales_analysis_model
description: 実店舗とECサイトの販売データを分析するためのセマンティックモデルです。200商品の商品マスターと結合済みの売上データ（2023年1月〜2025年3月）を対象に、チャネル別・商品別・期間別の売上分析が可能です。
tables:
  - name: RETAIL_DATA_WITH_PRODUCT_MASTER
    description: 実店舗での販売データ（約1,830件、2023年1月〜2025年3月）。商品マスターと結合済みで、商品名・単価・数量・合計金額を含みます。
    synonyms:
      - 店舗販売
      - 実店舗データ
      - 店舗売上
      - 店舗取引データ
    base_table:
      database: SNOWRETAIL_DB
      schema: SNOWRETAIL_SCHEMA
      table: RETAIL_DATA_WITH_PRODUCT_MASTER
    primary_key:
      columns:
        - transaction_id
    dimensions:
      - name: product_id_master
        description: 商品マスタで定義されている商品ID
        expr: PRODUCT_ID_MASTER
        data_type: VARCHAR
        synonyms:
          - 商品ID
          - product_id
          - プロダクトID
          - 製品ID
      - name: product_name_master
        description: 商品マスタで定義されている商品名
        expr: PRODUCT_NAME_MASTER
        data_type: VARCHAR
        synonyms:
          - 商品名
          - 製品名
          - プロダクト名
      - name: transaction_id
        description: トランザクションID
        expr: TRANSACTION_ID
        data_type: VARCHAR
        unique: true
        synonyms:
          - 取引ID
          - 取引番号
    time_dimensions:
      - name: transaction_date
        description: お客様が購入した日
        expr: TO_DATE(TRANSACTION_DATE)
        data_type: DATE
        synonyms:
          - 取引日
          - 購入日
    facts:
      - name: quantity
        description: 販売数量
        expr: QUANTITY
        data_type: NUMBER
        synonyms:
          - 販売数量
          - 購入数量
      - name: unit_price
        description: 販売単価
        expr: UNIT_PRICE
        data_type: NUMBER
        synonyms:
          - 販売単価
          - 購入単価
      - name: total_price
        description: 販売合計金額
        expr: TOTAL_PRICE
        data_type: NUMBER
        synonyms:
          - 合計金額
          - 合計販売金額
          - 合計購入金額
    metrics:
      - name: retail_sales_total
        description: 実店舗販売合計金額
        expr: SUM(total_price)
        synonyms:
          - 店舗合計売上
          - 店舗合計販売金額
      - name: retail_quantity_total
        description: 実店舗販売合計数量
        expr: SUM(quantity)
        synonyms:
          - 店舗合計売上数
          - 店舗合計販売数
      - name: retail_average_order_value
        description: 実店舗平均注文金額
        expr: AVG(total_price)
        synonyms:
          - 店舗平均売上
          - 店舗平均販売金額
